<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: A4; margin: 0; }
        body { 
            background: #f0f0f0; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
            filter: contrast(1.2) grayscale(0.8);
        }
        .paper {
            width: 180mm; height: 250mm; background: white; padding: 20mm;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            transform: rotate(-1.5deg); /* 기울어짐 */
        }
        .handwriting { font-family: 'Brush Script MT', cursive; color: blue; font-size: 20px; }
        h1 { color: #555; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="paper">
        <h1>비용 청구 지침 (Scanned Copy)</h1>
        <p>개인 경비 청구는 매월 말일까지 시스템에 입력 완료되어야 합니다.</p>
        <p style="margin-top: 50px;">영수증 증빙 시 다음 사항을 유의하세요:</p>
        <ul>
            <li>식비: 인당 1만원 이내</li>
            <li>교통비: 택시비 오후 10시 이후만 가능</li>
        </ul>
        <div class="handwriting" style="margin-top: 100px;">* 중요: 팀장님 확인 필수! (2/28까지)</div>
    </div>
</body>
</html>
