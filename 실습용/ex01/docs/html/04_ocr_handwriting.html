<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: A4; margin: 20mm; }
        body { font-family: sans-serif; }
        .box { border: 2px solid #000; padding: 20px; position: relative; }
        .hand { font-family: 'Brush Script MT', cursive; color: blue; font-size: 24px; position: absolute; transform: rotate(-5deg); top: 180px; left: 200px; }
    </style>
</head>
<body>
    <h1>지출 결의서</h1>
    <div class="box">
        <p><strong>청구자:</strong> 김주혁</p>
        <p><strong>금액:</strong> 150,000원</p>
        <p><strong>내역:</strong> 팀 회식비 (삼겹살)</p>
        <p><strong>결재:</strong> _________________</p>
        <div class="hand">Approved by CEO</div>
    </div>
    <p style="margin-top: 50px; color: red; font-weight: bold;">[주의] 승인 서명이 없는 청구서는 반려됩니다.</p>
</body>
</html>
