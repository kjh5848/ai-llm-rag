<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>업무 효율화 가이드 - 복잡한 표</title>
    <style>
        @page { size: A4; margin: 20mm; }
        body { font-family: 'Noto Sans KR', sans-serif; line-height: 1.5; color: #333; }
        h1 { border-left: 5px solid #2c3e50; padding-left: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 0; }
        th, td { padding: 12px; font-size: 13px; text-align: center; border: 0; } /* 테두리 없음 */
        .header-bg { background-color: #f2f2f2; font-weight: bold; }
        .row-even { background-color: #fafafa; }
        .category { background-color: #edf2f7; font-weight: bold; width: 100px; }
    </style>
</head>
<body>
    <h1>프로젝트 단계별 체크리스트 (투명 표)</h1>
    <p>본 표는 프로젝트의 각 단계에서 수행해야 할 핵심 과업을 정의합니다. (테두리 없음)</p>
    <table>
        <tr class="header-bg">
            <th colspan="2">프로젝트 단계</th>
            <th>주요 과업</th>
            <th>산출물</th>
            <th>비고</th>
        </tr>
        <tr>
            <td rowspan="2" class="category">기획</td>
            <td>요구사항 정의</td>
            <td>사용자 인터뷰 및 기능 리스트 작성</td>
            <td>요구사항 정의서</td>
            <td>-</td>
        </tr>
        <tr class="row-even">
            <td>시장 조사</td>
            <td>경쟁사 벤치마킹 및 트렌드 분석</td>
            <td>시장 조사 보고서</td>
            <td>긴급</td>
        </tr>
        <tr>
            <td rowspan="2" class="category">개발</td>
            <td>설계</td>
            <td>DB 스키마 및 API 설계</td>
            <td>설계 사양서</td>
            <td>중요</td>
        </tr>
        <tr class="row-even">
            <td>구현</td>
            <td>프론트엔드 및 백엔드 개발</td>
            <td>소스 코드</td>
            <td>-</td>
        </tr>
    </table>
</body>
</html>
